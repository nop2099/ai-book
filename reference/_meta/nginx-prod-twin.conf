# Mirrors the production shapes.exe.xyz server block as of 2026-03-12.
# The Python prod-twin server emulates this config locally when nginx
# is unavailable on the workstation.

map_hash_bucket_size 128;
include __SITE_DIR__/slug-map.conf;

server {
    listen 8000;
    listen [::]:8000;
    root __SITE_DIR__;
    index index.html;
    server_name _;

    if ($slug_rewrite) {
        rewrite ^ $slug_rewrite last;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
