<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — Shapes of Intelligence Reference</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #e0e0e0;
      --text-muted: #8888aa;
      --accent: #e94560;
      --accent2: #0f3460;
      --code-bg: #0d1117;
      --link: #58a6ff;
      --border: #30363d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      max-width: 72ch;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    header a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header a:hover { color: var(--accent); }

    h1 {
      font-size: 2rem;
      margin: 0.5rem 0 0.25rem;
      color: #fff;
    }

    .summary {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 0;
    }

    h2 {
      font-size: 1.3rem;
      margin: 2.5rem 0 0.75rem;
      color: #fff;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3rem;
    }

    h3 {
      font-size: 1.05rem;
      margin: 1.5rem 0 0.5rem;
      color: var(--accent);
    }

    p { margin: 0.75rem 0; }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
      position: relative;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.03em;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: #fff; border-color: var(--text-muted); }
    .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.88rem;
    }

    th {
      text-align: left;
      color: #fff;
      border-bottom: 2px solid var(--border);
      padding: 0.5rem 0.75rem;
    }

    td {
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0.75rem;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin: 1rem 0;
      background: var(--surface);
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: var(--text-muted);
    }

    ul, ol {
      padding-left: 1.5rem;
      margin: 0.75rem 0;
    }

    li { margin: 0.35rem 0; }

    strong { color: #fff; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .platforms {
      display: flex;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }

    .platform-tag {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      background: var(--accent2);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a { color: var(--text-muted); }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">Shapes of Intelligence</a> / <a href="index.html">Reference</a>
    <h1>{{title}}</h1>
    <p class="summary">{{summary}}</p>
    <div class="platforms">{{platforms}}</div>
  </header>

  <main>
    {{content}}
  </main>

  <footer>
    <p>Part of <a href="index.html">Shapes of Intelligence</a> — a companion reference for the book.</p>
    <p>This page can be read by humans or pasted into an AI agent as a setup skill.</p>
    <p><a href="https://github.com/nop2099/ai-book">GitHub</a></p>
  </footer>

  <script>
    document.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        const code = pre.querySelector('code');
        const text = (code || pre).textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
        });
      });
      pre.appendChild(btn);
    });
  </script>
</body>
</html>
